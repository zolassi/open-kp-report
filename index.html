function doLogin() {
  const job = document.getElementById('jobInput').value.trim();
  const pwd = document.getElementById('pwdInput').value.trim();
  const err = document.getElementById('errMsg');
  if (!job) { err.textContent = '请输入工号'; return; }
  if (!pwd) { err.textContent = '请输入密码'; return; }
  const person = DATA[job];
  if (!person) { err.textContent = '工号不存在或无待处理数据，请确认后重试'; return; }
  if (person.pwd !== pwd) { err.textContent = '密码错误，请联系财务核对'; return; }
  err.textContent = '';
  document.getElementById('personName').textContent = person.name;
  const tbody = document.getElementById('kpTableBody');
  tbody.innerHTML = '';
  person.kps.forEach((kp, i) => {
    tbody.innerHTML += `<tr>
      <td>${i+1}</td>
      <td><span class="tag">${kp.kp_no}</span></td>
      <td>${kp.ou}</td>
      <td>${kp.vendor}</td>
      <td>${kp.po_st}</td>
      <td><b>${kp.amount}</b></td>
      <td>${kp.currency}</td>
      <td>${kp.platform}</td>
      <td>${kp.strategy}</td>
    </tr>`;
  });
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('reportBox').style.display = 'block';
}

function doLogout() {
  document.getElementById('jobInput').value = '';
  document.getElementById('pwdInput').value = '';
  document.getElementById('errMsg').textContent = '';
  document.getElementById('loginBox').style.display = 'block';
  document.getElementById('reportBox').style.display = 'none';
}

['jobInput','pwdInput'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
});
</script>
